version: '3'
services:
  postgres:
    image: "postgres:latest"
    environment:
      - POSTGRES_PASSWORD=postgres_password
  redis:
    image: "redis:latest"
  nginx:
    restart: always
    build:
      dockerfile: Dockerfile.dev
      context: ./nginx
    ports:
      - '3050:80'
    depends_on:
      - api
      - client
  api:
    build:
      dockerfile: Dockerfile.dev 
      context: ./server # This is where we specify what directory to look for a Dockerfile.dev
    volumes:
      - /app/node_modules
      - ./server:/app
    environment:
      - REDIS_HOST=redis # The name of the service (above) created to host our redis service
      - REDIS_PORT=6379 # Default port for starting a redis instance
      - PGUSER=postgres # Default user
      - PGHOST=postgres # The name of the service (above) created to host postgres service
      - PGDATABASE=postgres
      - PGPASSWORD=postgres_password # This is the default password
      - PGPORT=5432 # Default port for postgres
    depends_on:
      - postgres
  client:
    environment:
      - WDS_SOCKET_PORT=0
    build:
      dockerfile: Dockerfile.dev
      context: ./client
    volumes:
      - /app/node_modules
      - ./client:/app
  worker:
    build:
      dockerfile: Dockerfile.dev
      context: ./worker
    volumes:
      - /app/node_modules
      - ./worker:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379